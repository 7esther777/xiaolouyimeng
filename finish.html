<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结束页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        #finishVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .back-container {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            display: none;
        }
        .back-home {
            font-size: 24px;
            color: #000;
            text-decoration: none;
            padding: 12px 30px;
            background: #f5f5dc; /* 米色背景 */
            border: 2px solid #fff;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .back-home:hover {
            background: #f0e6d2;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <video id="finishVideo" autoplay muted playsinline>
        <source src="assets/animations/finish.mp4" type="video/mp4">
        您的浏览器不支持视频播放
    </video>

    <div class="back-container">
        <a href="game.html" class="back-home">返回主页</a>
    </div>

    <script>
        const video = document.getElementById('finishVideo');
        const backContainer = document.querySelector('.back-container');

        video.addEventListener('loadedmetadata', () => {
            // 提前0.2秒暂停，避开末尾黑屏，可自行调整
            const stopTime = video.duration - 0.2;

            video.addEventListener('timeupdate', function onTimeUpdate() {
                if (video.currentTime >= stopTime) {
                    video.pause();
                    backContainer.style.display = 'block';
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    
                    if (video.requestFullscreen) {
                        video.requestFullscreen();
                    } else if (video.webkitRequestFullscreen) {
                        video.webkitRequestFullscreen();
                    } else if (video.msRequestFullscreen) {
                        video.msRequestFullscreen();
                    }
                }
            });
        });
    </script>
</body>
</html>
