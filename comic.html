<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动画过渡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        
        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #animation-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .menu-link {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 24px;
            font-family: "SimSun", serif; /* 宋体 */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            opacity: 1; /* 页面加载就显示 */
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .menu-link:hover {
            color: #ffd700;
            transform: scale(1.1);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="animation-video" muted playsinline>
            <source src="assets/animations/before.mp4" type="video/mp4">
            您的浏览器不支持视频播放
        </video>
        <a href="game.html" class="menu-link" id="menuBtn">＞＞主菜单</a>
    </div>

    <script>
        const video = document.getElementById('animation-video');
        
        video.addEventListener('ended', function() {
            video.pause();
        });
        
        window.addEventListener('load', function() {
            video.play().catch(function(err) {
                console.log('视频自动播放失败:', err);
            });
        });
    </script>
</body>
</html>
