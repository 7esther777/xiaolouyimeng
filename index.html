<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小楼一梦</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* 视频全屏 */
#introVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 10;
  opacity: 1;
  transition: opacity 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
}

/* 首页背景层，一开始就加载好 */
.home {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("assets/images/home-bg.png") no-repeat center;
  background-size: cover;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
}
</style>
</head>

<body>

<video id="introVideo" muted autoplay playsinline>
  <source src="assets/animations/opening.mp4" type="video/mp4">
</video>

<div class="home" id="home"></div>

<script>
const video = document.getElementById('introVideo');
const home = document.getElementById('home');

// 一开始就把背景图加载好，避免闪烁
home.style.opacity = 0;

video.addEventListener('ended', () => {
  // 同时淡入淡出，完全无缝丝滑
  home.style.opacity = 1;
  video.style.opacity = 0;

  // 过渡完再隐藏视频，不影响画面
  setTimeout(() => {
    video.style.display = 'none';
  }, 600);
});

// 点击页面任意位置跳转到 comic.html
document.addEventListener('click', () => {
  window.location.href = 'comic.html';
});

// 兜底
setTimeout(() => {
  if (!video.ended) {
    video.pause();
    home.style.opacity = 1;
    video.style.opacity = 0;
    setTimeout(() => {
      video.style.display = 'none';
    }, 600);
  }
}, 9000);
</script>

</body>
</html>
